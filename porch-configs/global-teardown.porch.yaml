name: Global Teardown
description: |
  This configuration file is used to run global teardown for Azure Verified Modules example tests.
  It's typically used in GitHub Actions to configure the environment before running other tasks.
commands:
  - type: shell
    name: Run teardown.sh if exists
    command_line: |
      if [ -f teardown.sh ]; then
        chmod +x ./teardown.sh && \
        ./teardown.sh
      fi
    working_directory: examples

  - type: pwsh
    name: Run teardown.ps1 if exists
    script: |
      if (Test-Path teardown.ps1) {
        & ./teardown.ps1
      }
    working_directory: examples
