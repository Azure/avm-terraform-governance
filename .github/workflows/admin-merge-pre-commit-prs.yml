---
name: admin-merge-pre-commit-prs

on:
  workflow_dispatch:
    inputs:
      repositories:
        description: 'Override the target repositories, use a comma separated list. Leave as All to run on all repositories.'
        default: 'All'
        type: string
      gh_token:
        description: 'User token to merge PRs, must have write access to target repositories.'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  FORCE_COLOR: 1

jobs:
  generate-matrix:
    name: Generate Matrix
    runs-on: ubuntu-latest
    environment: avm
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      matrixParallel: ${{ steps.matrix.outputs.matrixParallel }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate Matrix
        uses: ./.github/actions/avm-repos
        id: matrix
        with:
          repositories: ${{ inputs.repositories }}
          clientId: ${{ secrets.AVM_APP_CLIENT_ID }}
          privateKey: ${{ secrets.AVM_APP_PRIVATE_KEY }}

  merge-precommit-prs:
    name: ${{ matrix.repoId }} (${{ matrix.repoUrl }})
    runs-on: ubuntu-latest
    environment: avm
    needs: generate-matrix
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.generate-matrix.outputs.matrixParallel) }}
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Mask token
        shell: pwsh
        run: Write-Host "::add-mask::${{ inputs.gh_token }}"

      - name: Checkout governance repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Approve and merge pre-commit PRs
        shell: pwsh
        env:
          GH_TOKEN: ${{ inputs.gh_token }}
        run: |
          . ./tf-repo-mgmt/scripts/lib/GitHubPullRequest.ps1

          Merge-AvmBotPullRequests `
            -OrgAndRepoName "${{ matrix.repoFullName }}" `
            -Approve | Out-Null
