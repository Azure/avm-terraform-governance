---
name: module-release

on:
  workflow_dispatch:
    inputs:
      repositories:
        description: "Override the target repositories, use a comma separated list. Leave as All to run on all repositories."
        default: "All"
        type: string
      bump:
        description: "Semantic version part to increment for the release."
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "When true, only log the release that would be created without creating it."
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  FORCE_COLOR: 1

jobs:
  generate-matrix:
    name: Generate Matrix
    runs-on: ubuntu-latest
    environment: avm
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      matrixParallel: ${{ steps.matrix.outputs.matrixParallel }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate Matrix
        uses: ./.github/actions/avm-repos
        id: matrix
        with:
          repositories: ${{ inputs.repositories }}
          clientId: ${{ secrets.AVM_APP_CLIENT_ID }}
          privateKey: ${{ secrets.AVM_APP_PRIVATE_KEY }}

  release:
    name: ${{ matrix.repoId }} (${{ matrix.repoUrl }})
    runs-on: ubuntu-latest
    environment: avm
    needs: generate-matrix
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.generate-matrix.outputs.matrixParallel) }}
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.AVM_APP_CLIENT_ID }}
          private-key: ${{ secrets.AVM_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ matrix.repoName }}

      - name: Create release if there are new commits
        run: |
          set -euo pipefail
          FULL="${{ matrix.repoFullName }}"
          BUMP="${{ inputs.bump }}"
          DRY="${{ inputs.dry_run }}"

          # Resolve the latest published release. Modules that have never been
          # released are intentionally skipped - this workflow only patches
          # modules that already have a release on the Terraform Registry.
          LATEST=$(gh release view --repo "$FULL" --json tagName -q .tagName 2>/dev/null || true)
          if [ -z "$LATEST" ]; then
            echo "::notice title=$FULL::No existing release found - skipping (this workflow only patches already-released modules)."
            echo "- :fast_forward: \`$FULL\` skipped (no existing release)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Skip when the default branch has no commits beyond the latest tag.
          AHEAD=$(gh api "repos/$FULL/compare/$LATEST...main" -q .ahead_by)
          if [ "$AHEAD" -eq 0 ]; then
            echo "::notice title=$FULL::No new commits since $LATEST - skipping."
            echo "- :fast_forward: \`$FULL\` skipped (no new commits since \`$LATEST\`)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Compute the next semantic version, preserving any leading "v".
          case "$LATEST" in
            v*) PREFIX="v"; VER="${LATEST#v}" ;;
            *)  PREFIX="";  VER="$LATEST" ;;
          esac
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "::error title=$FULL::Unknown bump '$BUMP'"; exit 1 ;;
          esac
          NEXT="${PREFIX}${MAJOR}.${MINOR}.${PATCH}"

          if [ "$DRY" = "true" ]; then
            echo "::notice title=$FULL::[dry-run] would release $NEXT (was $LATEST, $AHEAD new commit(s))."
            echo "- :test_tube: \`$FULL\` dry-run -> would release \`$NEXT\` (was \`$LATEST\`, $AHEAD new commit(s))" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Creating the release tags the default branch HEAD; the Terraform
          # Registry auto-publishes the new version from the tag.
          gh release create "$NEXT" --repo "$FULL" --target main --title "$NEXT" --generate-notes
          echo "::notice title=$FULL::Released $NEXT (was $LATEST, $AHEAD new commit(s))."
          echo "- :rocket: \`$FULL\` released \`$NEXT\` (was \`$LATEST\`, $AHEAD new commit(s))" >> "$GITHUB_STEP_SUMMARY"
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
