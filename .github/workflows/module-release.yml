---
name: module-release

on:
  workflow_dispatch:
    inputs:
      repositories:
        description: "Override the target repositories, use a comma separated list. Leave as All to run on all repositories."
        default: "All"
        type: string
      bump:
        description: "Semantic version part to increment for the release."
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "When true, only log the release that would be created without creating it."
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  FORCE_COLOR: 1

jobs:
  generate-matrix:
    name: Generate Matrix
    runs-on: ubuntu-latest
    environment: avm
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      matrixParallel: ${{ steps.matrix.outputs.matrixParallel }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate Matrix
        uses: ./.github/actions/avm-repos
        id: matrix
        with:
          repositories: ${{ inputs.repositories }}
          clientId: ${{ secrets.AVM_APP_CLIENT_ID }}
          privateKey: ${{ secrets.AVM_APP_PRIVATE_KEY }}

  release:
    name: ${{ matrix.repoId }} (${{ matrix.repoUrl }})
    runs-on: ubuntu-latest
    environment: avm
    needs: generate-matrix
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.generate-matrix.outputs.matrixParallel) }}
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.AVM_APP_CLIENT_ID }}
          private-key: ${{ secrets.AVM_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ matrix.repoName }}

      - name: Checkout governance repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Create release if there are new commits
        run: |
          . ./tf-repo-mgmt/scripts/lib/ModuleRelease.ps1

          $dryRun = [System.Convert]::ToBoolean('${{ inputs.dry_run }}')

          Publish-ModuleRelease `
            -RepoFullName '${{ matrix.repoFullName }}' `
            -Bump '${{ inputs.bump }}' `
            -DryRun $dryRun | Out-Null
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
