---
name: Repository Sync

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      repositories:
        description: 'Override the target repositories, use a comma separated list. Leave as All to run on all repositories.'
        default: 'All'
        type: string
      repositories_to_skip:
        description: 'Override the repositories to skip, use a comma separated list. Leave as empty to not skip any repositories.'
        default: 'terraform-azurerm-avm-template'
        type: string
      plan_only:
        description: 'Whether to only plan the changes'
        default: true
        type: boolean
      force_user_removal:
        description: 'Force removal of users with direct access, even if they are JIT elevated.'
        default: false
        type: boolean
      sync_project_items:
        description: 'Whether to add each repository''s issues and PRs to the AVM All Up GitHub Project.'
        default: true
        type: boolean
      include_closed_project_items:
        description: 'Also add closed issues and closed/merged PRs to the project (heavy historical back-fill). Off by default.'
        default: false
        type: boolean
      project_url:
        description: 'The GitHub Project (ProjectV2) URL to add each repository''s issues and PRs to.'
        default: 'https://github.com/orgs/Azure/projects/1011'
        type: string
  schedule:
    - cron: '33 */4 * * 1-5'

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: ./tf-repo-mgmt

jobs:
  generate-matrix:
    name: Generate Matrix
    runs-on: ubuntu-latest
    environment: avm
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      matrixParallel: ${{ steps.matrix.outputs.matrixParallel }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate Matrix
        uses: ./.github/actions/avm-repos
        id: matrix
        with:
          repositories: ${{ case(github.event_name == 'workflow_dispatch', inputs.repositories, 'All') }}
          repositoriesToSkip: ${{ case(github.event_name == 'workflow_dispatch', inputs.repositories_to_skip, 'terraform-azurerm-avm-template') }}
          clientId: ${{ secrets.AVM_APP_CLIENT_ID }}
          privateKey: ${{ secrets.AVM_APP_PRIVATE_KEY }}

  run-sync:
    name: ${{ matrix.repoId }} (${{ matrix.repoUrl }})
    runs-on: ubuntu-latest
    environment: avm
    needs: generate-matrix
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.generate-matrix.outputs.matrixParallel) }}
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: latest
          terraform_wrapper: false

      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.AVM_APP_CLIENT_ID }}
          private-key: ${{ secrets.AVM_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Download Labels CSV File
        run: |
          ./scripts/Get-AvmLabels.ps1
        shell: pwsh

      - name: Run Sync for ${{ matrix.repoId }}
        run: |

          $triggerType = "${{ github.event_name }}"

          $planOnly = $false
          $forceUserRemoval = $false

          if($triggerType -eq "workflow_dispatch") {
            $planOnly = "${{ inputs.plan_only }}".ToLower() -eq "true"
            $forceUserRemoval = "${{ inputs.force_user_removal }}".ToLower() -eq "true"
          }

          Write-Output "Token: $env:GH_TOKEN"
          Write-Output "Repositories: $repositories"
          Write-Output "Plan Only: $planOnly"
          Write-Output "Force User Removal: $forceUserRemoval"

          $testSubscriptionIds = $env:TEST_SUBSCRIPTION_IDS | ConvertFrom-Json

          $repoMetaDataJson = $env:REPO_META_DATA_JSON
          $repoMetaData = $null
          if ($repoMetaDataJson -and $repoMetaDataJson -ne 'null') {
            $repoMetaData = $repoMetaDataJson | ConvertFrom-Json
          }

          Write-Host "Authenticating gh cli"
          gh auth login -h "GitHub.com"
          Write-Host "Running repo sync"
          ./scripts/Invoke-RepositorySync.ps1 `
            -planOnly $planOnly `
            -managementGroupId "${{ secrets.MANAGEMENT_GROUP_ID }}" `
            -testSubscriptionIds $testSubscriptionIds `
            -stateStorageAccountName "${{ secrets.STORAGE_ACCOUNT_NAME }}" `
            -stateResourceGroupName "${{ secrets.STORAGE_ACCOUNT_RESOURCE_GROUP_NAME }}" `
            -stateContainerName "${{ secrets.STORAGE_ACCOUNT_CONTAINER_NAME }}" `
            -identityResourceGroupName "${{ secrets.IDENTITY_RESOURCE_GROUP_NAME }}" `
            -repoId "${{ matrix.repoId }}" `
            -repoUrl "${{ matrix.repoUrl }}" `
            -repoMetaData $repoMetaData `
            -outputDirectory "${{ github.workspace }}" `
            -forceUserRemoval:$forceUserRemoval

        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_USE_AZUREAD: true
          ARM_USE_OIDC: true
          TEST_SUBSCRIPTION_IDS: ${{ secrets.TEST_SUBSCRIPTION_IDS }}
          REPO_META_DATA_JSON: ${{ toJson(matrix.repoMetaData) }}

      - name: Upload Issue Logs Json
        if: always() && hashFiles('issue.log.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.repoId }}.issue.log.json
          path: issue.log.json

      - name: Issue Error
        if: always() && hashFiles('issue.log.json') != ''
        run: |
          $issueLogJson = Get-Content -Path "${{ github.workspace }}/issue.log.json" -Raw
          $issueLog = ConvertFrom-Json $issueLogJson
          $hasError = $false
          $issueLog | ForEach-Object {
            $severity = if ($_.severity) { $_.severity } else { "error" }
            if ($severity -eq "warning") {
              echo "::warning title=${{ matrix.repoId }} has issues::$($_.message) Check the log file artifact for ${{ matrix.repoId }} to see the full details."
            } else {
              echo "::error title=${{ matrix.repoId }} has issues::$($_.message) Check the log file artifact for ${{ matrix.repoId }} to see the full details."
              $hasError = $true
            }
          }
          if ($hasError) { exit 1 }
        shell: pwsh

      - name: Add Repository Items to AVM All Up Project
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || inputs.sync_project_items) }}
        run: |

          $triggerType = "${{ github.event_name }}"

          $planOnly = $false
          $includeClosed = $false
          $projectUrl = "https://github.com/orgs/Azure/projects/1011"

          if ($triggerType -eq "workflow_dispatch") {
            $planOnly = "${{ inputs.plan_only }}".ToLower() -eq "true"
            $includeClosed = "${{ inputs.include_closed_project_items }}".ToLower() -eq "true"
            if ("${{ inputs.project_url }}".Trim() -ne "") {
              $projectUrl = "${{ inputs.project_url }}"
            }
          }

          Write-Output "Project URL: $projectUrl"
          Write-Output "Include Closed: $includeClosed"
          Write-Output "Plan Only: $planOnly"

          ./scripts/Add-RepositoryItemsToProject.ps1 `
            -repoUrl "${{ matrix.repoUrl }}" `
            -projectUrl $projectUrl `
            -includeClosed $includeClosed `
            -planOnly $planOnly `
            -outputDirectory "${{ github.workspace }}"

        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Upload Project Sync Log Json
        if: always() && hashFiles('project-sync.log.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.repoId }}.project-sync.log.json
          path: project-sync.log.json

      - name: Project Sync Error
        if: always() && hashFiles('project-sync.log.json') != ''
        run: |
          $projectSyncLogJson = Get-Content -Path "${{ github.workspace }}/project-sync.log.json" -Raw
          $projectSyncLog = ConvertFrom-Json $projectSyncLogJson
          $projectSyncLog | ForEach-Object {
            $severity = if ($_.severity) { $_.severity } else { "warning" }
            if ($severity -eq "warning") {
              echo "::warning title=${{ matrix.repoId }} project sync::$($_.message) Check the log file artifact for ${{ matrix.repoId }} to see the full details."
            } else {
              echo "::error title=${{ matrix.repoId }} project sync::$($_.message) Check the log file artifact for ${{ matrix.repoId }} to see the full details."
            }
          }
        shell: pwsh
